# Lumen interactive demo — demo.ruirufactorymabati.com
# Fully self-contained static build: the app runs in demo mode and answers
# every /api call in the browser from seeded sample data. No backend, no
# database — visitors can click anything and nothing real is touched.

server {
    listen 80;
    server_name demo.ruirufactorymabati.com;

    root /usr/share/nginx/demo;
    index index.html;

    # Keep the sandbox out of search results (the marketing site is the
    # indexable face of the product).
    add_header X-Robots-Tag "noindex, nofollow" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Belt-and-braces: demo never talks to the real API. If a request does
    # arrive here (interceptor bypassed / curl), answer inertly.
    location /api/ {
        return 404 '{"error":"Demo mode - the API is simulated in the browser"}';
        default_type application/json;
    }

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Robots-Tag "noindex, nofollow" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

