# Lumen marketing website — lumen.ruirufactorymabati.com
# Static Vite build + same-origin proxy for the public website API
# (contact form, trial signup, live stats/changelog).

server {
    listen 80;
    server_name lumen.ruirufactorymabati.com;

    root /usr/share/nginx/lumen;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Public website endpoints only — everything else on /api stays closed here.
    location /api/website/ {
        proxy_pass http://flask_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        return 404 '{"error":"Not available on this host"}';
        default_type application/json;
    }

    # Immutable hashed assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

