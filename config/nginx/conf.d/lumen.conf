# Lumen marketing website — the MAIN site on the apex + www.
# Static Vite build + same-origin proxy for the public website API
# (contact form, trial signup, live stats/changelog).
# The billing admin app lives on billing.ruirufactorymabati.com (billing.conf).

# Legacy subdomain — the site moved to the apex; keep old links working.
server {
    listen 80;
    server_name lumen.ruirufactorymabati.com;
    return 301 https://ruirufactorymabati.com$request_uri;
}

server {
    listen 80;
    server_name ruirufactorymabati.com www.ruirufactorymabati.com;

    root /usr/share/nginx/lumen;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Full /api proxy: the public website API is same-origin here, and
    # M-Pesa callbacks (MPESA_CALLBACK_URL) still point at the apex.
    location /api/ {
        proxy_pass http://flask_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    # Immutable hashed assets
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}

