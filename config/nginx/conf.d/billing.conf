# Infora billing — billing.ruirufactorymabati.com (admin UI, captive portal, API)
# The apex/www serve the Lumen marketing website (see lumen.conf).
# The apex keeps its own /api proxy for M-Pesa callbacks + the public website API.

upstream flask_api {
    server flask_app:5000;
    keepalive 16;
}

# HTTP — Cloudflare "Flexible" or redirect to HTTPS when origin cert is mounted
server {
    listen 80;
    server_name billing.ruirufactorymabati.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/snippets/billing-locations.conf;
}

