# Infora billing — ruirufactorymabati.com (admin UI, captive portal, API)

upstream flask_api {
    server flask_app:5000;
    keepalive 16;
}

# HTTP — Cloudflare "Flexible" or redirect to HTTPS when origin cert is mounted
server {
    listen 80;
    server_name ruirufactorymabati.com www.ruirufactorymabati.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/snippets/billing-locations.conf;
}

