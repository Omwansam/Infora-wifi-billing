# FreeRADIUS NAS clients — run `flask generate-radius-clients` to regenerate from DB
# Per-ISP secrets: each MikroTik uses its ISP's radius_secret (see isps table)

client localhost {
    ipaddr = 127.0.0.1
    secret = radius_secret_key
    shortname = localhost
    nas_type = other
}

# Docker bridge (development)
client docker_bridge {
    ipaddr = 172.16.0.0/12
    secret = radius_secret_key
    shortname = docker
    nas_type = other
}

# Example MikroTik NAS — replace with your router IP; regenerate via flask generate-radius-clients
client main_router {
    ipaddr = 192.168.88.1
    secret = radius_secret_key
    shortname = main_router
    nas_type = mikrotik
}
