# PostgreSQL queries for Infora billing (standard FreeRADIUS schema + hard-delete deprovision)

safe_characters = "@abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789.-_: /"

authorize_check_query = "\
    SELECT id, username, attribute, value, op \
    FROM radcheck \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_reply_query = "\
    SELECT id, username, attribute, value, op \
    FROM radreply \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY id"

authorize_group_check_query = "\
    SELECT id, groupname, attribute, value, op \
    FROM radgroupcheck \
    WHERE groupname = '%{SQL-Group}' \
    ORDER BY id"

authorize_group_reply_query = "\
    SELECT id, groupname, attribute, value, op \
    FROM radgroupreply \
    WHERE groupname = '%{SQL-Group}' \
    ORDER BY id"

group_membership_query = "\
    SELECT groupname \
    FROM radusergroup \
    WHERE username = '%{SQL-User-Name}' \
    ORDER BY priority"

accounting {
    reference = "%{tolower:type.%{Acct-Status-Type}}"

    type {
        accounting-on {
            query = "\
                UPDATE radacct \
                SET acctstoptime = NOW(), acctterminatecause = '%{Acct-Terminate-Cause}' \
                WHERE acctstoptime IS NULL AND nasipaddress = '%{NAS-IP-Address}'"
        }

        accounting-off {
            query = "\
                UPDATE radacct \
                SET acctstoptime = NOW(), acctterminatecause = '%{Acct-Terminate-Cause}' \
                WHERE acctstoptime IS NULL AND nasipaddress = '%{NAS-IP-Address}'"
        }

        start {
            query = "\
                INSERT INTO radacct \
                    (acctsessionid, acctuniqueid, username, realm, nasipaddress, \
                     nasportid, nasporttype, acctstarttime, acctupdatetime, \
                     acctsessiontime, acctauthentic, connectinfo_start, \
                     acctinputoctets, acctoutputoctets, calledstationid, \
                     callingstationid, servicetype, framedprotocol, framedipaddress) \
                VALUES \
                    ('%{Acct-Session-Id}', '%{Acct-Unique-Session-Id}', \
                     '%{SQL-User-Name}', '%{Realm}', '%{NAS-IP-Address}', \
                     '%{NAS-Port}', '%{NAS-Port-Type}', NOW(), NOW(), \
                     0, '%{Acct-Authentic}', '%{Connect-Info}', \
                     0, 0, '%{Called-Station-Id}', \
                     '%{Calling-Station-Id}', '%{Service-Type}', \
                     '%{Framed-Protocol}', '%{Framed-IP-Address}')"
        }

        interim-update {
            query = "\
                UPDATE radacct \
                SET acctupdatetime = NOW(), \
                    acctsessiontime = '%{Acct-Session-Time}', \
                    acctinputoctets = '%{Acct-Input-Octets}', \
                    acctoutputoctets = '%{Acct-Output-Octets}' \
                WHERE acctuniqueid = '%{Acct-Unique-Session-Id}'"
        }

        stop {
            query = "\
                UPDATE radacct \
                SET acctstoptime = NOW(), \
                    acctsessiontime = '%{Acct-Session-Time}', \
                    acctinputoctets = '%{Acct-Input-Octets}', \
                    acctoutputoctets = '%{Acct-Output-Octets}', \
                    acctterminatecause = '%{Acct-Terminate-Cause}', \
                    connectinfo_stop = '%{Connect-Info}' \
                WHERE acctuniqueid = '%{Acct-Unique-Session-Id}'"
        }
    }
}
