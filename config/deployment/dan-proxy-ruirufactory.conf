# Add to /opt/dan/deploy/nginx/conf.d/ruirufactory.conf
# Billing static files + API proxy to infora_flask on host :5080

# HTTP
server {
    listen 80;
    server_name ruirufactorymabati.com www.ruirufactorymabati.com billing.ruirufactorymabati.com;

    client_max_body_size 32m;

    root /var/www/infora-billing;
    index index.html;

    location /api/ {
        proxy_pass http://172.17.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS (Cloudflare Full strict)
server {
    listen 443 ssl;
    http2 on;
    server_name ruirufactorymabati.com www.ruirufactorymabati.com billing.ruirufactorymabati.com;

    ssl_certificate /etc/nginx/ssl/ruirufactory.crt;
    ssl_certificate_key /etc/nginx/ssl/ruirufactory.key;

    client_max_body_size 32m;

    root /var/www/infora-billing;
    index index.html;

    location /api/ {
        proxy_pass http://172.17.0.1:5080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
