services:
  # PostgreSQL Database
  postgres:
    image: postgres:13
    container_name: infora_postgres
    environment:
      POSTGRES_DB: infora_billing
      POSTGRES_USER: infora_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infora_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infora_user -d infora_billing"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - infora_network

  # Flask Application
  flask_app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: infora_flask
    cap_add:
      - NET_ADMIN
    environment:
      FLASK_APP: server/app.py
      FLASK_ENV: development
      PORTAL_BASE_URL: http://localhost:5173
      DATABASE_URL: postgresql://infora_user:${POSTGRES_PASSWORD:-infora_password}@postgres:5432/infora_billing
      JWT_SECRET_KEY: your-super-secret-jwt-key-change-in-production
      RADIUS_SECRET: radius_secret_key
      FREERADIUS_HOST: freeradius
      PUBLIC_SERVER_HOST: ${PUBLIC_SERVER_HOST:-10.0.0.10}
      WIREGUARD_CONFIG_DIR: /app/wireguard_configs
      WIREGUARD_MIKROTIK_AUTO_PUSH: "true"
      RADIUS_CLIENTS_CONF_PATH: /config/freeradius/clients.conf
    volumes:
      - ./backend:/app
      - ./certs:/app/certs
      - wireguard_configs:/app/wireguard_configs
      - ./config/freeradius/clients.conf:/config/freeradius/clients.conf
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      freeradius:
        condition: service_started
    networks:
      - infora_network
    command: >
      sh -c "flask db upgrade &&
             flask initdb &&
             python server/app.py"

  # FreeRADIUS Server
  freeradius:
    build:
      context: ./config/freeradius
      dockerfile: Dockerfile
    container_name: infora_freeradius
    environment:
      RADIUS_SECRET: radius_secret_key
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./config/freeradius/clients.conf:/etc/freeradius/3.0/clients.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infora_network

  # OpenLDAP Server
  openldap:
    image: osixia/openldap:1.5.0
    container_name: infora_openldap
    environment:
      LDAP_ORGANISATION: "Lumen"
      LDAP_DOMAIN: "company.com"
      LDAP_ADMIN_PASSWORD: "admin_password"
      LDAP_CONFIG_PASSWORD: "config_password"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
      - ./config/ldap/ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom
    ports:
      - "389:389"
      - "636:636"
    networks:
      - infora_network

  # LDAP Admin (Web UI for LDAP management)
  ldap_admin:
    image: osixia/phpldapadmin:latest
    container_name: infora_ldap_admin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8080:80"
    depends_on:
      - openldap
    networks:
      - infora_network

  # WireGuard VPN (Linux server mode — configs from Flask)
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: infora_wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Africa/Nairobi
    volumes:
      - wireguard_configs:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
      - "51821:51821/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - infora_network
    depends_on:
      - flask_app

  # Frontend (React/Vite) — dev only; use npm run build + nginx in production
  frontend:
    profiles:
      - dev
    build:
      context: ./FRONTEND/infora_billing
      dockerfile: Dockerfile
    container_name: infora_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./FRONTEND/infora_billing:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:5000
      VITE_RADIUS_SERVER: ${PUBLIC_SERVER_HOST:-10.0.0.10}
    depends_on:
      - flask_app
    networks:
      - infora_network
    command: npm run dev -- --host 0.0.0.0

  # Billing demo (dev) — same app in demo mode; API simulated in the browser
  demo:
    profiles:
      - dev
    build:
      context: ./FRONTEND/infora_billing
      dockerfile: Dockerfile
    container_name: lumen_demo
    ports:
      - "5174:5174"
    volumes:
      - ./FRONTEND/infora_billing:/app
      - /app/node_modules
    environment:
      VITE_DEMO_MODE: "true"
      VITE_API_BASE_URL: ""
      VITE_MARKETING_URL: http://localhost:5175
    networks:
      - infora_network
    command: npm run dev -- --host 0.0.0.0 --port 5174

  # Lumen marketing website (dev)
  lumen:
    profiles:
      - dev
    build:
      context: ./LUMEN/lumen-website
      dockerfile: Dockerfile
    container_name: lumen_website
    ports:
      - "5175:5175"
    volumes:
      - ./LUMEN/lumen-website:/app
      - /app/node_modules
    environment:
      VITE_APP_URL: http://localhost:5173
      VITE_DEMO_URL: http://localhost:5174
      VITE_API_BASE_URL: http://localhost:5000
    depends_on:
      - flask_app
    networks:
      - infora_network

volumes:
  isp_uploads:
  postgres_data:
  ldap_data:
  ldap_config:
  wireguard_configs:

networks:
  infora_network:
    driver: bridge
